<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA: build the manifest link inline at parse time so an installed
         tenant app opens to that tenant's portal (not the landlord login).
         Done before any static manifest link exists so iOS reads the right
         start_url at "Add to Home Screen" time. -->
    <script>
      (function () {
        var p = location.pathname, href = "/manifest.json";
        if (p.indexOf("/tenant/") === 0) {
          var token = p.slice(8).replace(/[^a-zA-Z0-9-]/g, "");
          if (token) href = "/api/manifest?token=" + token;
        }
        var l = document.createElement("link");
        l.rel = "manifest"; l.href = href;
        document.head.appendChild(l);
      })();
    </script>
    <meta name="theme-color" content="#3820c0" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Prop Manager" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <title>Property Manager</title>
    <meta name="description" content="Manage your rental property, pay rent, and report issues" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet" />

    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        background: #f0efe9;
        font-family: 'Bricolage Grotesque', sans-serif;
      }
      #root {
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
      }
      /* Prevent rubber band scroll showing white */
      body::before {
        content: '';
        position: fixed;
        top: -50vh;
        left: 0;
        right: 0;
        height: 50vh;
        background: #f0efe9;
        z-index: -1;
      }
      body::after {
        content: '';
        position: fixed;
        bottom: -50vh;
        left: 0;
        right: 0;
        height: 50vh;
        background: #f0efe9;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
